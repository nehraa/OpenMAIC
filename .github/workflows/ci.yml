name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check (teacher)
        run: pnpm --filter @aidutech/teacher tsc --noEmit
        continue-on-error: false

      - name: TypeScript check (student)
        run: pnpm --filter @aidutech/student tsc --noEmit
        continue-on-error: false

      - name: Lint (teacher)
        run: pnpm --filter @aidutech/teacher lint
        continue-on-error: false

      - name: Lint (student)
        run: pnpm --filter @aidutech/student lint
        continue-on-error: false

      - name: Build (teacher)
        run: pnpm --filter @aidutech/teacher build
        continue-on-error: false

      - name: Build (student)
        run: pnpm --filter @aidutech/student build
        continue-on-error: false